[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  # Faz o frontend usar as Netlify Functions reais (e não o mock da Fase 1)
  VITE_USE_MOCK = "false"
  # IA via Netlify AI Gateway (credenciais injetadas em runtime) — sem chave externa.

[functions]
  # Bundler para as Functions em TypeScript
  node_bundler = "esbuild"
  # Dependências nativas/pesadas ficam externas ao bundle
  external_node_modules = ["mammoth", "xlsx", "papaparse"]

[dev]
  framework = "vite"
  targetPort = 5173
  port = 8888

# SPA fallback: tudo que não for /api ou asset volta para o index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
